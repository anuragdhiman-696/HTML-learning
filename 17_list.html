<!-- list are used to represent real life list data  -->
 <!-- two types - unordered <ul> - bullet points form 
                - oredered <ol> - in number sequence (can also in roman numbs)
                 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>apple</li>
        <ul>
            <li>color=red</li>
            <li>Taste = sweet</li>
        </ul>
        <li>mango</li>
        <li>Litchi</li>
    </ul>
    <hr>
    <ol>
        <li>apple</li>
        <ul>
            <li>color=red</li>
            <li>Taste = sweet</li>
        </ul>
        <li>Mango</li>
        <li>Litchi</li>
    </ol>
</body>
</html>
