<!-- tables are used to represent real life table data  -->
 <!-- <tr> - used to display table row
    <td> -         used to display table data 
        <th> - used to display table header  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <thead>
        <caption>
            student data 
        </caption>
        <tr>
             <th colspan="2">
                INFORMATION
            </th>
        </tr>
        <tr>
            <th>
                Name
            </th>
            <th>
                Roll No
            </th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>
                Xi Jin
            </td>
            <td>
                1664
            </td>
        </tr>
        </tbody>
    </table>
</body>
</html>
<!-- by caption tag we can add captions in tables -->
 <!-- thead and tbody wraps up the head and body part of table  -->
